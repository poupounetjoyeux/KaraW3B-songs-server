name: Build & push Docker image

on:
  release:
    types:
      - published

jobs: 
  release:
    if: github.repository == 'KaraW3B/server'
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract release version
        run: |
          tagVersion="${{ github.event.release.tag_name }}"
          releaseVersion="${tagVersion:1}"
          echo "releaseVersion=$releaseVersion" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
          
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          tags:
            - karaw3b/server:latest
            - karaw3b/server:${{ env.releaseVersion }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
